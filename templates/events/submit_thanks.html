{% extends 'base.html' %}
{% block title %}Thanks! - Community Playlist{% endblock %}
{% block styles %}
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.wrap{max-width:500px}
img{max-width:200px;width:100%;margin-bottom:30px}
h1{color:#ff6b35;font-size:1.8em;margin-bottom:12px}
p{color:#aaa;line-height:1.7;margin-bottom:20px}
.back{display:inline-block;background:#ff6b35;color:#fff;padding:10px 24px;border-radius:6px;text-decoration:none;font-size:.9em}
.back:hover{background:#e55a25}
</style>
{% endblock %}
{% block body %}
<div class="wrap">
<img src="https://hihi.communityplaylist.com/files/timeline_files/store_file6809b5ed4135d-community_playlist_site_logo_2025.png" alt="Community Playlist">
<h1>Thanks! 🌹</h1>
<p>Your event has been submitted and is pending review. We'll get it up within 24 hours.</p>
<p>Built with love for PDX.</p>
<a href="/" class="back">← Back to events</a>
</div>
{% endblock %}
