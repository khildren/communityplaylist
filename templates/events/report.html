{% extends 'base.html' %}
{% block title %}Report Content — Community Playlist{% endblock %}
{% block body %}
<div style="max-width:540px;margin:48px auto;padding:0 20px 80px;color:#ccc;font-family:-apple-system,sans-serif">
  <a href="javascript:history.back()" style="color:#888;font-size:.82em;text-decoration:none">← Back</a>
  <h1 style="color:#eee;font-size:1.3em;margin:20px 0 24px">Report Content</h1>

  {% if submitted %}
  <div style="background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px;padding:16px 20px;color:#4caf50">
    ✓ Report received — thank you. We'll review it shortly.
  </div>
  {% else %}
  <form method="post" style="display:flex;flex-direction:column;gap:14px">
    {% csrf_token %}
    <div>
      <label style="display:block;font-size:.82em;color:#888;margin-bottom:5px">URL of the page or profile you're reporting</label>
      <input type="url" name="url" placeholder="https://communityplaylist.com/..."
             style="width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#eee;font-size:.88em">
    </div>
    <div>
      <label style="display:block;font-size:.82em;color:#888;margin-bottom:5px">Reason <span style="color:#555">(required)</span></label>
      <textarea name="reason" rows="5" required placeholder="Describe the issue..."
                style="width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#eee;font-size:.88em;font-family:inherit;resize:vertical"></textarea>
    </div>
    <button type="submit"
            style="background:#ff6b35;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:.88em;align-self:flex-start">
      Submit report
    </button>
  </form>
  {% endif %}
</div>
{% endblock %}
